services:
  app:
    build:
      context: ./docker
      dockerfile: Dockerfile
    container_name: symfony-app
    ports:
      - "8080:80"
    volumes:
      #- ./docker:/etc/apache2/sites-enabled
      - .:/var/www
    # environment:
    #   - APACHE_DOCUMENT_ROOT=/var/www/public
    depends_on:
      - db
    networks:
      - symfony_network

  # db:
  #   image: mysql:8.0
  #   container_name: symfony-db
  #   command: --default-authentication-plugin=mysql_native_password
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - db_data:/var/lib/mysql
  #   environment:
  #     MYSQL_ALLOW_EMPTY_PASSWORD: "no"
  #     MYSQL_ROOT_PASSWORD: root
  #     # MYSQL_DATABASE: sf-api-pressing
  #     # MYSQL_USER: root
  #     # MYSQL_PASSWORD: root
  #   networks:
  #     - symfony_network
  db:
    image: mysql:8.0
    container_name: symfony-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: sf-api-pressing
      MYSQL_USER: root
      MYSQL_PASSWORD: root
    ports:
      - "3306:3306"
    networks:
      - symfony_network

  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db
    networks:
      - symfony_network

volumes:
  db_data:

networks:
  symfony_network:
