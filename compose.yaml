services:
  database:
    image: mysql:8.0
    container_name: database
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: sf-api-pressing
      # MYSQL_USER: root
      # MYSQL_PASSWORD: root
    ports:
      - "4306:3306"
    volumes:
      - ./mysql:/var/lib/mysql

  php:
    container_name: php
    build:
      context: ./docker
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ./docker/vhosts.conf:/etc/apache2/sites-enabled/000-default.conf
      - .:/var/www
    depends_on:
      - database

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8090:80"
    environment:
      PMA_HOST: database # Lien avec le conteneur MySQL nommé "database"
      PMA_USER: root # Utilisateur MySQL, ici "root"
      PMA_PASSWORD: secret # Mot de passe défini pour l'utilisateur root
    depends_on:
      - database
